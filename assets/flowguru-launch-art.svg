<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="FlowGuru launch artwork">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151B12"/>
      <stop offset="0.52" stop-color="#09100D"/>
      <stop offset="1" stop-color="#050605"/>
    </linearGradient>
    <linearGradient id="trail" x1="110" y1="130" x2="1420" y2="830" gradientUnits="userSpaceOnUse">
